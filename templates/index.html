<!DOCTYPE html>
<html>
<head>

<title>AI Document Summarizer</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="text-center mb-4">AI Document Summarizer</h1>

<form action="/summarize/" method="post" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Paste Text</label>
<textarea class="form-control" name="text" rows="6"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload PDF / DOCX</label>
<input type="file" class="form-control" name="pdf">
</div>

<button class="btn btn-primary w-100">Generate Summary </button>

</form>


{% if summary %}

<div class="card mt-4 bg-secondary text-light">

<div class="card-body">

<h4>Summary</h4>

<p class="summary-text">{{ summary }}</p>

</div>

</div>

{% endif %}

</div>

</body>
</html>
