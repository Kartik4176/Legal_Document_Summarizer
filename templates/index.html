<!DOCTYPE html>
<html>
<head>
<title>AI Document Summarizer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(120deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
}

.main-card {
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.title {
    font-weight: bold;
    text-shadow: 0 0 15px #00f2ff;
}

textarea, input {
    background: rgba(0,0,0,0.6) !important;
    color: white !important;
    border: none !important;
}

.btn-glow {
    background: linear-gradient(45deg, #00f2ff, #ff00c8);
    border: none;
    transition: 0.3s;
}
.btn-glow:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00f2ff;
}

.summary-box {
    max-height: 250px;
    overflow-y: auto;
    border-radius: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.08);
}

.loader {
    display: none;
    text-align: center;
    margin-top: 15px;
}

@keyframes float {
    0% {transform: translateY(0px);}
    50% {transform: translateY(-10px);}
    100% {transform: translateY(0px);}
}
.floating {
    animation: float 3s ease-in-out infinite;
}
</style>

</head>

<body class="text-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

<div class="col-md-8">

<div class="main-card p-4 floating">

<h2 class="text-center title mb-2"> Legal Document Summarizer</h2>
<p class="text-center text-secondary mb-4">Fast. Smart. Minimal effort.</p>

<form action="/summarize/" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

{% csrf_token %}

<div class="mb-3">
<label>Paste Text</label>
<textarea id="textInput" class="form-control" name="text" rows="5" placeholder="Paste your document..."></textarea>
<div class="text-end small text-secondary" id="charCount">0 characters</div>
</div>

<div class="mb-3">
<label>Upload File</label>
<input type="file" name="pdf" class="form-control">
</div>

<button class="btn btn-glow w-100 py-2"> Generate Summary</button>

<div class="loader" id="loader">
<div class="spinner-border text-info"></div>
<p>Generating summary...</p>
</div>

</form>

{% if summary %}

<div class="mt-4">
<h5>📄 Summary</h5>

<div class="summary-box" id="summaryText"></div>

<div class="mt-2 d-flex gap-2">
<button class="btn btn-outline-light btn-sm" onclick="copyText()">Copy</button>
<button class="btn btn-outline-info btn-sm" onclick="downloadText()">Download</button>
<button class="btn btn-outline-warning btn-sm" onclick="speakText()">Listen</button>
<button class="btn btn-outline-danger btn-sm" onclick="stopText()">Stop</button>
</div>

</div>

<script>
// Typing effect
let text = `{{ summary|escapejs }}`;
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("summaryText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 10);
    }
}
typeEffect();
</script>

{% endif %}

</div>

</div>

</div>

<script>
// Character count
document.getElementById("textInput").addEventListener("input", function() {
    document.getElementById("charCount").innerText = this.value.length + " characters";
});

// Loader
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

// Copy
function copyText() {
    let text = document.getElementById("summaryText").innerText;
    navigator.clipboard.writeText(text);
}

// Download
function downloadText() {
    let text = document.getElementById("summaryText").innerText;
    let blob = new Blob([text], {type: "text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "summary.txt";
    a.click();
}

// Speak
function speakText() {
    speechSynthesis.cancel();
    let text = document.getElementById("summaryText").innerText;
    let msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// Stop
function stopText() {
    speechSynthesis.cancel();
}
</script>

</body>
</html>
