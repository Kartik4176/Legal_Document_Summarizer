<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="summary-card">
            <h2 class="title">📄 Document Summary</h2>
            
            <!-- Added summary-box class here to use your white background & scrolling -->
            <div class="summary-content summary-box">
                <ul class="summary-list">
                    {% for point in summary.split:"•" %}
                        {% if point.strip %}
                            <li>{{ point|strip }}</li>
                        {% endif %}
                    {% endfor %}
                </ul>
            </div>

            <div class="button-group">
                <a href="/" class="btn btn-secondary">⬅ Back</a>
                <a href="/download/" class="btn btn-success">⬇ Download PDF</a>
            </div>
        </div>
    </div>
</body>
</html>
